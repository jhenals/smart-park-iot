version: '3.8'

services:
  # Development mode with hot-reload
  smartparkiot:
    container_name: smart-park-api-dev
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    env_file:
      - ./IoT_ProjectWeatherForcast/.env
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:8000,http://localhost:5173,http://127.0.0.1:8000,http://localhost:5174
      - APP_ENV=development
    volumes:
      # Mount source code for hot-reload
      - ./IoT_ProjectWeatherForcast/app:/app/app
      - ./database:/app/database
    restart: unless-stopped

  # Vue.js Development Server
  weather-frontend:
    container_name: smart-park-weather-dev
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./IoT_ProjectWeatherForcast/weather:/app
      - /app/node_modules  # Anonymous volume for node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - iot-network
    restart: unless-stopped

  # InfluxDB
  influxdb:
    container_name: smart-park-influxdb-dev
    image: influxdb:2.7-alpine
    env_file:
      - ./IoT_ProjectWeatherForcast/.env
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-adminpassword}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-smart-park}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-iot-data}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb-dev-data:/var/lib/influxdb2
      - influxdb-dev-config:/etc/influxdb2
    networks:
      - iot-network
    restart: unless-stopped

networks:
  iot-network:
    driver: bridge

volumes:
  influxdb-dev-data:
  influxdb-dev-config:
