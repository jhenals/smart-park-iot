version: '3.8'

services:
  # FastAPI Backend + Frontend
  smartparkiot:
    container_name: smart-park-api
    image: smartparkiot:latest
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - ./IoT_ProjectWeatherForcast/.env
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:8000,http://localhost:5173,http://127.0.0.1:8000
    volumes:
      - ./database:/app/database:ro  # Read-only mount for database files
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # InfluxDB Time-Series Database
  influxdb:
    container_name: smart-park-influxdb
    image: influxdb:2.7-alpine
    env_file:
      - ./IoT_ProjectWeatherForcast/.env
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-adminpassword}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-smart-park}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-iot-data}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - iot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Grafana for Visualization (Optional)
  grafana:
    container_name: smart-park-grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - iot-network
    restart: unless-stopped

networks:
  iot-network:
    driver: bridge

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
