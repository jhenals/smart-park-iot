version: '3.8'
services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8000:8000"
    env_file:
      - ./IoT_ProjectWeatherForcast/.env
    volumes:
      - ./IoT_ProjectWeatherForcast:/app/IoT_ProjectWeatherForcast
      - ./firebase-config:/app/firebase-config
      - ./ml-engines:/app/ml-engines
      - ./docs:/app/docs
    command:  uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  adminfrontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    command: npm run dev -- --host
    restart: unless-stopped

  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      target: webapp
    ports:
      - "8081:8081"
    depends_on:
      - fastapi
      - adminfrontend
    env_file:
      - ./IoT_ProjectWeatherForcast/.env
    volumes:
      - ./IoT_ProjectWeatherForcast:/app/IoT_ProjectWeatherForcast
      - ./firebase-config:/app/firebase-config
      - ./ml-engines:/app/ml-engines
    restart: unless-stopped

  mlengine:
    build:
      context: ./ml-engines
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    volumes:
      - ./ml-engines:/usr/src/app
      - ./firebase-config:/usr/src/app/firebase-config
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=smartpark
      - DOCKER_INFLUXDB_INIT_BUCKET=main
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=admintoken
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data:
