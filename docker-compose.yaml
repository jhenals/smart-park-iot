version: '3.8'
services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./database:/app/database
      - ./web-app:/app/static/web-app
      - ./IoT_ProjectWeatherForcast:/app/IoT_ProjectWeatherForcast
      - ./firebase-config:/app/firebase-config
      - ./ml-engines:/app/ml-engines
      - ./docs:/app/docs
      - ./Robustel EG5120:/app/Robustel_EG5120
      - ./Robustel EG5120 ML:/app/Robustel_EG5120_ML
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  ml-engine:
    build:
      context: ./ml-engines
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    volumes:
      - ./ml-engines:/usr/src/app
      - ./firebase-config:/usr/src/app/firebase-config
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=smartpark
      - DOCKER_INFLUXDB_INIT_BUCKET=main
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=admintoken
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data:
