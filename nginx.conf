events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 8081;
        server_name localhost;

        root  /usr/share/nginx/html;
        index index.html;

        # Static folders from your tree
        location /assets/ { try_files $uri =404; }
        location /styles/ { try_files $uri =404; }
        location /public/ { try_files $uri =404; }
        location /src/ { try_files $uri =404; }

        # Static file extensions
        location ~* \.(?:css|js|mjs|map|json|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            try_files $uri =404;
        }

        # Optional: browse copied files
        location /files/ {
            alias /usr/share/nginx/html/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            try_files $uri $uri/ =404;
        }

        # SPA fallback (for app routes only)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}