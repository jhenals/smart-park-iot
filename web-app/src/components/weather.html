<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Park : Weather Forecast</title>
    <link rel="stylesheet" href="../../assets/styles/index.css" />
    <link rel="stylesheet" href="../../assets/styles/weather.css" />
    <script
      src="https://kit.fontawesome.com/fde79452b1.js"
      crossorigin="anonymous"
    ></script>
    <script src="../../assets/js/dynamic-navbar.js"></script>
    <script src="../../assets/js/index.js"></script>
  </head>
  <body>
    <nav
      id="dynamic-navbar"
      class="navbar sticky-top navbar-expand-lg"
      data-variant="auto"
      data-public-prefix="/web-app/"
    ></nav>
    <header class="d-flex flex-row">
      <h1>Weather Forecast Giganti della Sila</h1>
    </header>

    <div>
      <div id="current-date" class="text-center mt-2 mb-4"></div>

      <div class="d-flex flex-row justify-content-center gap-4 mb-5">
        <div id="weather-forecast" class="smart-card flex-column text-center">
          <h4>Hourly Forecast</h4>
          <ul
            id="forecast-list"
            style="list-style: none; padding: 0; margin: 0"
          ></ul>
        </div>

        <div class="d-flex flex-column gap-4">
          <div class="safety-gauge smart-card">
            <h4>Safety Status</h4>
            <div class="gauge-container">
              <svg viewBox="0 0 100 50">
                <path
                  d="M10,50 A40,40 0 0,1 90,50"
                  fill="none"
                  stroke="#eee"
                  stroke-width="10"
                />
                <path
                  id="safety-pointer"
                  d="M10,50 A40,40 0 0,1 50,10"
                  fill="none"
                  stroke="#4caf50"
                  stroke-width="10"
                />
              </svg>
              <strong id="safety-label">HIGHLY SAFE</strong>
            </div>
          </div>

          <div class="forecast-table smart-card">
            <h4>Microclimate (S6000U Nodes)</h4>
            <div class="hourly-row">
              <span>14:00</span>
              <span class="icon">☀️</span>
              <span>19°C</span>
              <span>Low Wind</span>
            </div>
          </div>
        </div>
      </div>

      <div class="smart-card flex-column text-center mb-5 forecast-calab">
        <h1 class="text-center mt-5">Weather Forecast Calabria</h1>
        <iframe
          src="https://www.parks.it/parco.nazionale.sila/Emeteo.php"
          width="80%"
          height="600"
          style="
            border: 5px solid var(--primary-color);
            margin: 20px auto;
            display: block;
          "
        >
        </iframe>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Smart Park IoT</p>
    </footer>
    <script src="../../assets/js/weather.js"></script>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
