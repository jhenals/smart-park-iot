<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Park : Weather Forecast</title>
    <link rel="stylesheet" href="../../assets/styles/index.css" />
    <link rel="stylesheet" href="../../assets/styles/weather.css" />
    <link
      rel="stylesheet"
      href="../../assets/styles/components/dynamic-navbar.css"
    />

    <script
      src="https://kit.fontawesome.com/fde79452b1.js"
      crossorigin="anonymous"
    ></script>
    <script src="../../assets/js/dynamic-navbar.js"></script>
    <script src="../../assets/js/index.js"></script>
  </head>
  <body>
    <nav
      id="dynamic-navbar"
      class="navbar sticky-top navbar-expand-lg"
      data-variant="auto"
      data-public-prefix="/web-app/"
    ></nav>
    <header>
      <h1>Weather Forecast Giganti della Sila</h1>
    </header>

    <div>
      <div id="current-date" class="text-center mt-2 mb-4"></div>

      <div class="weather-dashboard">
        <section class="forecast-container glass-card">
          <h3>Hourly Forecast</h3>
          <ul id="forecast-list" class="list-unstyled"></ul>
        </section>
        <div class="weather-advanced-grid">
          <div class="decision-card glass-card">
            <h4>🌲 Trail Readiness</h4>
            <div id="hike-recommendation" class="status-badge">
              Highly Recommended
            </div>
            <p>Stable pressure and low humidity detected by Node 101.</p>
          </div>

          <div class="trend-card glass-card">
            <h4>📉 1h Pressure Trend</h4>
            <canvas id="pressureChart"></canvas>
          </div>

          <div class="gear-card glass-card">
            <h4>🎒 Essential Gear</h4>
            <ul id="gear-list"></ul>
          </div>
        </div>
      </div>

      <div class="glass-card flex-column text-center mb-5 mt-5 forecast-calab">
        <h1 class="text-center">Weather Forecast Calabria</h1>
        <iframe
          src="https://www.parks.it/parco.nazionale.sila/Emeteo.php"
          width="80%"
          height="600"
          style="
            border: 5px solid var(--primary-color);
            margin: 20px auto;
            display: block;
          "
        >
        </iframe>
      </div>
    </div>

    <iframe
      src="../../src/components/footer.html"
      style="width: 100%; border: none; display: block; height: 45px"
    ></iframe>
    <script src="../../assets/js/weather.js"></script>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
