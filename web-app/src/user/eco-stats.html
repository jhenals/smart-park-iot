<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Park: Eco-Insight</title>
    <link rel="stylesheet" href="../../assets/styles/eco-insight.css" />
    <link rel="stylesheet" href="../../assets/styles/index.css" />
    <link
      rel="stylesheet"
      href="../../assets/styles/components/dynamic-navbar.css"
    />
    <script src="../../assets/js/eco-insight.js"></script>
    <script src="../../assets/js/dynamic-navbar.js"></script>
  </head>
  <body>
    <nav id="dynamic-navbar" class="navbar-container"></nav>

    <div class="eco-container">
      <header class="eco-header">
        <h1>Your Eco-Journey</h1>
        <p>A summary of your experience at Giganti della Sila</p>
      </header>

      <div class="eco-grid">
        <section class="eco-card passport">
          <h3>🌲 Giants Discovered</h3>
          <div id="giants-checklist" class="checklist"></div>
        </section>

        <section class="eco-card metrics">
          <h3>🍃 Your Air Quality Exposure</h3>
          <div class="metric-summary">
            <div class="metric-item">
              <span class="label">Average Noise</span>
              <strong id="avg-noise">-- dB</strong>
            </div>
            <div class="metric-item">
              <span class="label">Average Temp</span>
              <strong id="avg-temp">-- °C</strong>
            </div>
          </div>
          <p class="eco-note">
            The Laricio pines acted as a natural noise buffer for your path.
          </p>
        </section>
      </div>

      <button
        class="main-button"
        onclick="window.location.href = '/web-app/src/user/user-dashboard.html'"
      >
        Back to Dashboard
      </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
