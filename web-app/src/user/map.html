<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Park GPS & Localization</title>
    <link rel="stylesheet" href="../../assets/styles/index.css" />
    <link rel="stylesheet" href="../../assets/styles/map.css" />
    <script
      src="https://kit.fontawesome.com/fde79452b1.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
  </head>

  <body>
    <header>
      <button id="home-btn" class="main-button" onclick="goToUserDashboard()">
        <span class="fa-sharp fa-solid fa-house"></span>
      </button>
      <h1>Giganti della Sila Map</h1>
    </header>

    <section class="map-section d-flex flex-row">
      <div id="loading-message">Loading map data, please wait...</div>
      <div id="map"></div>
      <div class="sidebar-container">
        <div class="mb-2">
          <button id="locate-btn" class="main-button" onclick="locateUser()">
            📍Locate Me
          </button>
          <button id="refresh-btn" class="main-button" onclick="refreshMap()">
            🔄 Refresh Data
          </button>
        </div>
        <div class="sidebar">
          <h3>Device Status</h3>
          <div class="device-list-container mb-3">
            <p>Device List:</p>
            <ul id="device-list" style="list-style: none; padding: 0"></ul>
          </div>
          <div class="alert-list-container">
            <p>
              Alerts
              <mark>(Click on an alert for details)</mark>
              :
            </p>
            <ul id="alert-list" style="list-style: none; padding: 0"></ul>
          </div>
        </div>
      </div>
    </section>
    <script src="../../assets/js/map.js"></script>
  </body>
</html>
