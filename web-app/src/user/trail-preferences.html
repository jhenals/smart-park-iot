<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sila Park - Tailor Your Visit</title>
    <link rel="stylesheet" href="../../assets/styles/index.css" />
    <link rel="stylesheet" href="../../assets/styles/trail-pref.css" />
    <script src="../../assets/constants/constants.js"></script>
  </head>
  <body>
    <section class="preferences-container">
      <header>
        <h1>How do you want to experience the Park?</h1>
        <h2>Tailor your visit</h2>
        <p>
          Our AI will suggest the best trail based on real-time sensor data.
        </p>
      </header>
      <form id="preferencesForm" class="glass-card">
        <div class="input-group">
          <label>Trail Difficulty:</label>
          <select id="difficulty"></select>
        </div>

        <div class="input-group">
          <label>Preferred Environment:</label>
          <select id="environment"></select>
        </div>

        <div class="input-group">
          <label>Primary Interest:</label>
          <select id="interest"></select>
        </div>

        <button
          type="button"
          class="main-button"
          onclick="
            generateMockRecommendation();
            document
              .getElementById('recommendation-result')
              .scrollIntoView({ behavior: 'smooth' });
          "
        >
          Get Recommendation
        </button>
      </form>
    </section>
    <section>
      <div id="recommendation-result" style="display: none; margin-top: 50px">
        <h3>Recommended for You:</h3>
        <h2 id="trail-name"></h2>
        <div id="trail-details" class="trail-info"></div>
        <button class="main-button" onclick="goToHomepage()">
          Start Hiking
        </button>
      </div>
    </section>

    <script src="../../assets/js/trail-preferences.js"></script>
  </body>
</html>
