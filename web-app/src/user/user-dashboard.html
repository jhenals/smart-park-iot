<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Park - User Dashboard</title>
    <link rel="stylesheet" href="../../assets/styles/index.css" />
    <link
      rel="stylesheet"
      href="../../assets/styles/components/dynamic-navbar.css"
    />
    <script src="../../assets/js/dynamic-navbar.js"></script>
  </head>
  <body>
    <nav id="dynamic-navbar" class="navbar-container"></nav>

    <section>
      <div class="dashboard-container">
        <div id="weather-alert" class="alert-banner">
          Checking weather conditions...
        </div>

        <header>
          <h1>Giganti della Sila: <span id="active-trail">Trail Name</span></h1>
          <p>Welcome, <span id="display-username">Explorer</span>!</p>
        </header>

        <div class="main-layout">
          <div class="map-section">
            <div id="map-container">
              <p>Loading GPS Tracking...</p>
            </div>
          </div>

          <div class="stats-sidebar">
            <div class="stat-card">
              <h4>Local Temperature</h4>
              <p id="temp-val">--°C</p>
            </div>
            <div class="stat-card">
              <h4>Noise Level</h4>
              <p id="noise-val">-- dB</p>
            </div>
          </div>
        </div>

        <button id="chatbot-trigger" onclick="toggleChat()">
          💬 Ask the Guide
        </button>
      </div>
    </section>

    <script src="../../assets/js/user-dashboard.js"></script>
  </body>
</html>
